{% extends "base.html" %}

{% block content %}
<div class="app-layout">

  <div class="page-header" style="padding:20px 20px 0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2>Nouvelle transaction</h2>
      <a href="/dashboard" style="font-size:12px;color:var(--text2);
         text-decoration:none">Annuler</a>
    </div>
    <p>Saisie rapide — description optionnelle</p>
  </div>

  <div class="main-content" style="padding-top:20px">

    <!-- Type -->
    <div class="seg-btn" id="seg-btn">
      <button class="active" onclick="setType('depense',this)">Dépense</button>
      <button onclick="setType('revenu',this)">Revenu</button>
    </div>

    <!-- Montant + Date -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label>Montant</label>
        <input type="number" id="amount" placeholder="0.00"
               step="0.01" min="0.01">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="text" id="date" placeholder="JJ/MM/AAAA">
      </div>
    </div>

    <!-- Description -->
    <div class="form-group" style="margin-top:10px">
      <label>Description (optionnel)</label>
      <input type="text" id="description"
             placeholder="ex : Monoprix courses semaine">
    </div>

    <!-- Catégorie -->
    <div style="margin-top:14px;margin-bottom:6px">
      <span style="font-size:12px;color:var(--text2);font-weight:500;
                   text-transform:uppercase;letter-spacing:.4px">
        Catégorie
      </span>
    </div>
    <div class="cat-grid" id="cat-grid">
      <div class="empty-state">Chargement...</div>
    </div>

    <!-- Feedback -->
    <div id="feedback" class="error-msg hidden" style="margin-bottom:12px"></div>

    <!-- Bouton -->
    <button class="btn-primary" onclick="submit()">
      Enregistrer la transaction
    </button>

  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a class="nav-item" data-page="dashboard" href="/dashboard">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>
      <span>Accueil</span>
    </a>
    <a class="nav-item" data-page="history" href="/history">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="3" width="16" height="14" rx="2"/><line x1="5" y1="8" x2="15" y2="8"/><line x1="5" y1="12" x2="10" y2="12"/></svg>
      <span>Historique</span>
    </a>
    <a class="fab" href="/add">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="white" stroke-width="2.5"><line x1="11" y1="4" x2="11" y2="18"/><line x1="4" y1="11" x2="18" y2="11"/></svg>
    </a>
    <a class="nav-item" data-page="stats" href="/stats">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="2,15 6,9 10,11.5 13,6 18,4.5"/></svg>
      <span>Stats</span>
    </a>
    <a class="nav-item" data-page="settings" href="/settings">
    <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="10" cy="10" r="2.5"/>
        <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"/>
    </svg>
    <span>Réglages</span>
    </a>
  </nav>

</div>
{% endblock %}

{% block scripts %}
<script>
if (!requireAuth()) {}

let selectedType       = 'depense'
let selectedCategoryId = null

// Pré-remplir la date
document.getElementById('date').value = todayFR()

async function init() {
    const res  = await api('/categories/')
    const cats = await res.json()
    const grid = document.getElementById('cat-grid')
    grid.innerHTML = ''

    if (!cats.length) {
        grid.innerHTML = '<div class="empty-state">Aucune catégorie</div>'
        return
    }

    cats.forEach(cat => {
        const el = document.createElement('div')
        el.className  = 'cat-item'
        el.dataset.id = cat.id
        el.innerHTML  = `
            <div class="cat-dot" style="background:${cat.color}"></div>
            <div class="cat-name">${cat.name}</div>
        `
        el.onclick = () => selectCat(cat.id, el)
        grid.appendChild(el)
    })
}

function setType(type, btn) {
    selectedType = type
    document.querySelectorAll('.seg-btn button').forEach(b =>
        b.classList.remove('active'))
    btn.classList.add('active')
}

function selectCat(id, el) {
    document.querySelectorAll('.cat-item').forEach(c =>
        c.classList.remove('selected'))
    if (selectedCategoryId === id) {
        selectedCategoryId = null
    } else {
        selectedCategoryId = id
        el.classList.add('selected')
    }
}

async function submit() {
    const amount = document.getElementById('amount').value
    const date   = document.getElementById('date').value
    const desc   = document.getElementById('description').value.trim()
    const fb     = document.getElementById('feedback')

    if (!amount || parseFloat(amount) <= 0) {
        showFb('Le montant doit être positif.', true); return
    }
    if (!date) {
        showFb('La date est obligatoire.', true); return
    }

    const res = await api('/transactions/', {
        method: 'POST',
        body: JSON.stringify({
            amount:      String(amount),
            description: desc,
            date:        date,
            tx_type:     selectedType,
            category_id: selectedCategoryId,
        })
    })

    if (res && res.ok) {
        showFb('Transaction enregistrée !', false)
        document.getElementById('amount').value      = ''
        document.getElementById('description').value = ''
        document.getElementById('date').value        = todayFR()
        selectedCategoryId = null
        document.querySelectorAll('.cat-item').forEach(c =>
            c.classList.remove('selected'))
        setTimeout(() => fb.classList.add('hidden'), 2000)
    } else {
        const data = res ? await res.json() : {}
        showFb(data.detail || 'Erreur lors de l\'enregistrement.', true)
    }
}

function showFb(msg, isError) {
    const fb = document.getElementById('feedback')
    fb.textContent = msg
    fb.style.background = isError
        ? 'rgba(240,149,149,.1)' : 'rgba(93,202,165,.1)'
    fb.style.borderColor = isError
        ? 'rgba(240,149,149,.3)' : 'rgba(93,202,165,.3)'
    fb.style.color = isError ? '#F09595' : '#5DCAA5'
    fb.classList.remove('hidden')
}

init()
showOnboarding('add')
</script>
{% endblock %}
